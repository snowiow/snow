- include_tasks: "{{ ansible_os_family }}.yml"

- name: create .local/bin directory
  file:
    path: ~/.local/bin
    state: directory

- name: symlink .local bin
  file:
    src: "{{ ansible_env.PWD }}/roles/base/files/bin/{{ item.src | default(item) }}"
    path: "~/.local/bin/{{ item.name | default(item) }}"
    state: link
    follow: false
    force: yes
  loop:
    - src: aws-gen-profiles.py
      name: aws-gen-profiles
    - bank-to-ledger
    - dkb-to-ledger
